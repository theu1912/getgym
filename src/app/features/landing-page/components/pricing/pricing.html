<section class="pricing-section" id="planos">
  <div class="pricing-header">
    <h2>Escolha o seu plano</h2>
    <p>Planos flexíveis para a sua rotina e seus objetivos.</p>
  </div>

  <div class="pricing-cards">
    @for (plan of plans; track plan.name) {
      <div class="card" [class.highlighted]="plan.highlight">
        
        @if (plan.badge) {
          <div class="badge">{{ plan.badge }}</div>
        }
        
        <div class="card-header">
          <h3>{{ plan.name }}</h3>
          <div class="price">
            <span class="currency">R$</span>
            <span class="amount">{{ plan.price }}</span>
            <span class="period">{{ plan.period }}</span>
          </div>
        </div>

        <ul class="features">
          @for (feature of plan.features; track feature) {
            <li>
              <span class="check-icon">✓</span>
              {{ feature }}
            </li>
          }
        </ul>

        <button
          type="button"
          [class.btn-primary]="plan.highlight"
         [class.btn-secondary]="!plan.highlight"
         (click)="$event.preventDefault(); garantirPlano(plan.name)">
        Garantir Este Plano
</button>
      </div>
    }
  </div>
</section>
